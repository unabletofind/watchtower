name: Fetch Jobs Twice Daily

on:
  schedule:
    # 4am IST = 22:30 UTC previous day
    - cron: '30 22 * * *'
    # 4pm IST = 10:30 UTC same day
    - cron: '30 10 * * *'
  workflow_dispatch:  # manual trigger button in Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetcher
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/fetch_jobs.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: refresh jobs $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
